<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>juniors.digital — Client Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root, [data-theme="light"] {
  --color-bg: #f5f4f0;
  --color-surface: #f8f7f4;
  --color-surface-2: #fafaf8;
  --color-surface-offset: #f0eeea;
  --color-surface-dynamic: #e8e5e0;
  --color-divider: #d8d5d0;
  --color-border: #ccc9c2;
  --color-text: #1a1814;
  --color-text-muted: #6b6a65;
  --color-text-faint: #b0afab;
  --color-text-inverse: #f8f7f4;
  --color-primary: #0069b0;
  --color-primary-hover: #004f88;
  --color-primary-active: #003560;
  --color-primary-highlight: #c6d8e8;
  --color-success: #3a7a1e;
  --color-success-hover: #295c12;
  --color-success-highlight: #cfe0c8;
  --color-warning: #a05010;
  --color-warning-hover: #7a3c0a;
  --color-warning-highlight: #e0d0c0;
  --color-error: #a02030;
  --color-error-hover: #7a1825;
  --color-error-highlight: #e0c8cc;
  --color-orange: #c86010;
  --color-gold: #c09000;
  --color-purple: #7030b0;
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 240 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 240 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 240 / 0.12);
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem; --space-16: 4rem;
  --font-body: 'Geist', 'Inter', system-ui, sans-serif;
  --font-mono: 'Geist Mono', 'JetBrains Mono', monospace;
  --sidebar-width: 240px;
  --header-height: 56px;
}
[data-theme="dark"] {
  --color-bg: #0e0d0c;
  --color-surface: #141312;
  --color-surface-2: #1a1916;
  --color-surface-offset: #1f1e1b;
  --color-surface-dynamic: #272523;
  --color-divider: #2a2825;
  --color-border: #333028;
  --color-text: #e0ddd8;
  --color-text-muted: #7a7870;
  --color-text-faint: #504e48;
  --color-text-inverse: #1a1814;
  --color-primary: #4898d8;
  --color-primary-hover: #2278b8;
  --color-primary-active: #1060a0;
  --color-primary-highlight: #1e3048;
  --color-success: #58a030;
  --color-success-hover: #388018;
  --color-success-highlight: #203818;
  --color-warning: #e08830;
  --color-warning-hover: #c07018;
  --color-warning-highlight: #483010;
  --color-error: #d84860;
  --color-error-hover: #b83048;
  --color-error-highlight: #481820;
  --color-orange: #e89040;
  --color-gold: #e8b838;
  --color-purple: #a868e0;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.5);
}
@media (prefers-color-scheme: dark) { :root:not([data-theme]) { --color-bg: #0e0d0c; --color-surface: #141312; --color-surface-2: #1a1916; --color-surface-offset: #1f1e1b; --color-surface-dynamic: #272523; --color-divider: #2a2825; --color-border: #333028; --color-text: #e0ddd8; --color-text-muted: #7a7870; --color-text-faint: #504e48; --color-primary: #4898d8; --color-primary-hover: #2278b8; --color-primary-highlight: #1e3048; --color-success: #58a030; --color-success-highlight: #203818; --color-warning: #e08830; --color-warning-highlight: #483010; --color-error: #d84860; --color-error-highlight: #481820; } }

/* ============ BASE ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text); background: var(--color-bg); line-height: 1.5; }
img { display: block; max-width: 100%; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input, select, textarea { font: inherit; color: inherit; }
a, button, [role="button"], input, select, textarea { transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }

/* ============ LAYOUT ============ */
#app { display: grid; grid-template-columns: var(--sidebar-width) 1fr; grid-template-rows: var(--header-height) 1fr; min-height: 100dvh; }
#app.sidebar-collapsed { --sidebar-width: 56px; }

/* ============ HEADER ============ */
.header { grid-column: 1 / -1; grid-row: 1; display: flex; align-items: center; gap: var(--space-4); padding-inline: var(--space-4); background: var(--color-surface); border-bottom: 1px solid var(--color-border); position: sticky; top: 0; z-index: 100; height: var(--header-height); }
.header-logo { display: flex; align-items: center; gap: var(--space-2); text-decoration: none; color: var(--color-text); flex-shrink: 0; width: calc(var(--sidebar-width) - var(--space-8)); }
.header-logo svg { flex-shrink: 0; }
.logo-text { font-size: var(--text-sm); font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; opacity: 1; transition: opacity 0.2s; }
#app.sidebar-collapsed .logo-text { opacity: 0; width: 0; }
.header-divider { width: 1px; height: 24px; background: var(--color-border); }
.header-breadcrumb { display: flex; align-items: center; gap: var(--space-1); color: var(--color-text-muted); font-size: var(--text-xs); }
.header-breadcrumb .current { color: var(--color-text); font-weight: 500; }
.header-actions { margin-left: auto; display: flex; align-items: center; gap: var(--space-2); }
.btn-icon { display: grid; place-items: center; width: 36px; height: 36px; border-radius: var(--radius-md); color: var(--color-text-muted); }
.btn-icon:hover { background: var(--color-surface-offset); color: var(--color-text); }
.btn-icon:active { background: var(--color-surface-dynamic); }
.avatar { width: 32px; height: 32px; border-radius: var(--radius-full); background: var(--color-primary); display: grid; place-items: center; font-size: var(--text-xs); font-weight: 600; color: white; flex-shrink: 0; }

/* ============ SIDEBAR ============ */
.sidebar { grid-row: 2; grid-column: 1; background: var(--color-surface); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; position: sticky; top: var(--header-height); height: calc(100dvh - var(--header-height)); overflow-y: auto; overflow-x: hidden; padding: var(--space-3) 0; }
.nav-section { padding: 0 var(--space-3) var(--space-4); }
.nav-section-label { font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-faint); padding: var(--space-1) var(--space-2); margin-bottom: var(--space-1); white-space: nowrap; overflow: hidden; opacity: 1; transition: opacity 0.2s; }
#app.sidebar-collapsed .nav-section-label { opacity: 0; }
.nav-item { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-2); border-radius: var(--radius-md); color: var(--color-text-muted); font-size: var(--text-sm); font-weight: 500; text-decoration: none; cursor: pointer; white-space: nowrap; position: relative; user-select: none; }
.nav-item:hover { background: var(--color-surface-offset); color: var(--color-text); }
.nav-item.active { background: var(--color-primary-highlight); color: var(--color-primary); }
.nav-item svg { flex-shrink: 0; width: 18px; height: 18px; }
.nav-item-label { overflow: hidden; opacity: 1; transition: opacity 0.2s; }
#app.sidebar-collapsed .nav-item-label { opacity: 0; width: 0; }
.nav-badge { margin-left: auto; background: var(--color-primary); color: white; font-size: var(--text-xs); font-weight: 600; padding: 1px 7px; border-radius: var(--radius-full); min-width: 20px; text-align: center; transition: opacity 0.2s; }
#app.sidebar-collapsed .nav-badge { opacity: 0; }
.sidebar-footer { margin-top: auto; padding: var(--space-3); border-top: 1px solid var(--color-border); }

/* ============ MAIN CONTENT ============ */
.main { grid-row: 2; grid-column: 2; overflow-y: auto; overflow-x: hidden; padding: var(--space-6); display: flex; flex-direction: column; gap: var(--space-6); }

/* ============ PAGE HEADER ============ */
.page-header { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); }
.page-title { font-size: var(--text-xl); font-weight: 700; letter-spacing: -0.03em; color: var(--color-text); }
.page-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); margin-top: var(--space-1); }
.page-header-actions { display: flex; gap: var(--space-2); }

/* ============ BUTTONS ============ */
.btn { display: inline-flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4); border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; border: 1px solid transparent; cursor: pointer; white-space: nowrap; }
.btn-primary { background: var(--color-primary); color: white; border-color: var(--color-primary); }
.btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
.btn-secondary { background: var(--color-surface-offset); color: var(--color-text); border-color: var(--color-border); }
.btn-secondary:hover { background: var(--color-surface-dynamic); }
.btn-ghost { background: transparent; color: var(--color-text-muted); }
.btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }
.btn-sm { padding: var(--space-1) var(--space-3); font-size: var(--text-xs); }
.btn-danger { background: var(--color-error-highlight); color: var(--color-error); border-color: color-mix(in oklch, var(--color-error) 25%, transparent); }
.btn-danger:hover { background: var(--color-error); color: white; }

/* ============ KPI CARDS ============ */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); }
.kpi-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5); display: flex; flex-direction: column; gap: var(--space-2); box-shadow: var(--shadow-sm); }
.kpi-label { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.kpi-value { font-size: var(--text-xl); font-weight: 700; letter-spacing: -0.03em; font-variant-numeric: tabular-nums lining-nums; }
.kpi-trend { font-size: var(--text-xs); color: var(--color-text-muted); display: flex; align-items: center; gap: var(--space-1); }
.kpi-trend.up { color: var(--color-success); }
.kpi-trend.neutral { color: var(--color-text-muted); }

/* ============ SECTION CARD ============ */
.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-divider); }
.card-title { font-size: var(--text-base); font-weight: 600; }
.card-actions { display: flex; gap: var(--space-2); align-items: center; }
.card-body { padding: var(--space-5); }

/* ============ TABLE ============ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
thead th { font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-muted); padding: var(--space-3) var(--space-4); text-align: left; border-bottom: 1px solid var(--color-border); background: var(--color-surface-offset); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--color-divider); transition: background var(--transition-interactive); cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: color-mix(in oklch, var(--color-primary) 4%, var(--color-surface)); }
tbody td { padding: var(--space-3) var(--space-4); vertical-align: middle; color: var(--color-text); font-variant-numeric: tabular-nums; }
.td-muted { color: var(--color-text-muted); font-size: var(--text-xs); }
.td-name { font-weight: 500; }
.td-email { color: var(--color-text-muted); font-size: var(--text-xs); font-family: var(--font-mono); }
.td-actions { display: flex; gap: var(--space-1); justify-content: flex-end; }

/* ============ BADGES ============ */
.badge { display: inline-flex; align-items: center; gap: var(--space-1); padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600; }
.badge-new { background: var(--color-primary-highlight); color: var(--color-primary); }
.badge-reviewing { background: var(--color-warning-highlight); color: var(--color-warning); }
.badge-quoted { background: color-mix(in oklch, var(--color-purple) 18%, transparent); color: var(--color-purple); }
.badge-accepted { background: var(--color-success-highlight); color: var(--color-success); }
.badge-in-progress { background: color-mix(in oklch, var(--color-gold) 18%, transparent); color: var(--color-gold); }
.badge-completed { background: var(--color-success-highlight); color: var(--color-success); }
.badge-declined { background: var(--color-error-highlight); color: var(--color-error); }
.badge-archived { background: color-mix(in oklch, var(--color-text-muted) 15%, transparent); color: var(--color-text-muted); }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ============ FILTERS & SEARCH ============ */
.filters-bar { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
.search-input { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
.search-input svg { position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%); color: var(--color-text-muted); pointer-events: none; }
.search-input input { width: 100%; padding: var(--space-2) var(--space-3) var(--space-2) calc(var(--space-3) + 20px); background: var(--color-surface-offset); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--color-text); }
.search-input input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-primary) 20%, transparent); }
.search-input input::placeholder { color: var(--color-text-faint); }
.filter-select { padding: var(--space-2) var(--space-3); background: var(--color-surface-offset); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--color-text); cursor: pointer; }
.filter-select:focus { outline: none; border-color: var(--color-primary); }
.tab-list { display: flex; gap: 0; border-bottom: 1px solid var(--color-border); }
.tab-btn { padding: var(--space-3) var(--space-4); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; white-space: nowrap; }
.tab-btn:hover { color: var(--color-text); }
.tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
.tab-count { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 16px; font-size: var(--text-xs); font-weight: 700; background: var(--color-primary-highlight); color: var(--color-primary); border-radius: var(--radius-full); margin-left: var(--space-1); }

/* ============ EMPTY STATE ============ */
.empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: var(--space-16) var(--space-8); color: var(--color-text-muted); }
.empty-state-icon { width: 48px; height: 48px; margin-bottom: var(--space-4); color: var(--color-text-faint); }
.empty-state h3 { color: var(--color-text); margin-bottom: var(--space-2); font-size: var(--text-base); font-weight: 600; }
.empty-state p { max-width: 36ch; margin-bottom: var(--space-6); font-size: var(--text-sm); }

/* ============ MODAL ============ */
.modal-backdrop { position: fixed; inset: 0; background: oklch(0.1 0 0 / 0.6); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: var(--space-4); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); width: 100%; max-width: 600px; max-height: 90dvh; overflow-y: auto; transform: scale(0.97) translateY(8px); transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
.modal-backdrop.open .modal { transform: scale(1) translateY(0); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-5) var(--space-6); border-bottom: 1px solid var(--color-divider); }
.modal-title { font-size: var(--text-lg); font-weight: 600; letter-spacing: -0.02em; }
.modal-body { padding: var(--space-6); display: flex; flex-direction: column; gap: var(--space-5); }
.modal-footer { display: flex; justify-content: flex-end; gap: var(--space-3); padding: var(--space-4) var(--space-6); border-top: 1px solid var(--color-divider); }

/* ============ DETAIL GRID ============ */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
.detail-item { display: flex; flex-direction: column; gap: var(--space-1); }
.detail-label { font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-muted); }
.detail-value { font-size: var(--text-sm); color: var(--color-text); }
.detail-value.mono { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-muted); }
.detail-full { grid-column: 1 / -1; }

/* ============ STATUS SELECT ============ */
.status-select-group { display: flex; gap: var(--space-2); flex-wrap: wrap; }
.status-option { padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600; border: 1px solid var(--color-border); cursor: pointer; transition: all var(--transition-interactive); }
.status-option:hover { opacity: 0.8; }
.status-option.selected { box-shadow: 0 0 0 2px var(--color-primary); }

/* ============ GOAL METER ============ */
.goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.goal-item { display: flex; flex-direction: column; gap: var(--space-1); }
.goal-label { font-size: var(--text-xs); color: var(--color-text-muted); }
.goal-bar { height: 6px; background: var(--color-surface-dynamic); border-radius: var(--radius-full); overflow: hidden; }
.goal-fill { height: 100%; background: var(--color-primary); border-radius: var(--radius-full); }
.goal-score { font-size: var(--text-xs); font-weight: 700; font-variant-numeric: tabular-nums; }

/* ============ TOAST ============ */
.toast-container { position: fixed; bottom: var(--space-6); right: var(--space-6); z-index: 300; display: flex; flex-direction: column; gap: var(--space-2); }
.toast { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4); font-size: var(--text-sm); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: var(--space-3); max-width: 360px; animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
.toast.success { border-left: 3px solid var(--color-success); }
.toast.error { border-left: 3px solid var(--color-error); }
@keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* ============ AUTH SCREEN ============ */
.auth-screen { position: fixed; inset: 0; background: var(--color-bg); z-index: 500; display: flex; align-items: center; justify-content: center; }
.auth-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-8); width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
.auth-logo { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-8); }
.auth-title { font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.02em; }
.auth-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); margin-top: var(--space-1); margin-bottom: var(--space-6); }
.form-group { display: flex; flex-direction: column; gap: var(--space-2); margin-bottom: var(--space-4); }
.form-label { font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted); }
.form-input { padding: var(--space-3) var(--space-4); background: var(--color-surface-offset); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--color-text); width: 100%; }
.form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-primary) 20%, transparent); }
.form-input::placeholder { color: var(--color-text-faint); }
.auth-error { display:none; align-items:center; gap:var(--space-2); font-size:var(--text-xs); color:var(--color-error); background:var(--color-error-highlight); border:1px solid oklch(from var(--color-error) l c h / 0.25); border-radius:var(--radius-md); padding:var(--space-2) var(--space-3); margin-top:var(--space-3); } .auth-error.visible { display:flex; animation:authShake 0.35s ease; } @keyframes authShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

}

}
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>

        <path d="M16 8h8l-4 8 4 8h-8V8z" fill="currentColor"/>

<!-- MAIN APP -->

  <!-- HEADER -->

        <span class="nav-item-label">Sign out</span>

  <!-- MAIN -->

<!-- MODAL -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============ STATE ============
let currentView = 'dashboard';
let sidebarCollapsed = false;
let currentUser = null;
let allQuotes = [];
let allProjects = [];
let activeQuoteFilter = 'all';
let activeProjectFilter = 'all';
let quoteSearch = '';
let projectSearch = '';

// ============ MOCK DATA ============
const MOCK_QUOTES = [];

const MOCK_PROJECTS = [];

// ============ SUPABASE AUTH ============
const SUPABASE_URL = 'https://ivnwmvezbmyenwpczdcw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bndtdmV6Ym15ZW53cGN6ZGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzODExMTQsImV4cCI6MjA4Nzk1NzExNH0.y9wYDEe5bWMtYtc2v514GM_5B-pJ55uVpaoq3kRmiO4';
const ALLOWED_USER_ID = 'e49efb48-9761-4c6d-bc35-e2b714110a22';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showAuthError(msg) {
  const el = document.getElementById('authError');
  document.getElementById('authErrorText').textContent = msg;
  el.classList.remove('visible');
  void el.offsetWidth;
  el.classList.add('visible');
}
function hideAuthError() {
  document.getElementById('authError').classList.remove('visible');
}
async function handleLogin() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const loginBtn = document.getElementById('loginBtn');
  hideAuthError();
  if (!email || !password) { showAuthError('Please enter your email and password.'); return; }
  loginBtn.disabled = true;
  loginBtn.textContent = 'Signing in…';
  const { data, error } = await _sb.auth.signInWithPassword({ email, password });
  loginBtn.disabled = false;
  loginBtn.textContent = 'Sign in';
  if (error) { showAuthError('Incorrect credentials. Please try again.'); return; }
  if (data.user.id !== ALLOWED_USER_ID) {
    await _sb.auth.signOut();
    showAuthError('Access denied. Unauthorized account.');
    return;
  }
  currentUser = data.user.email;
  const initials = (data.user.email || 'JD').split('@')[0].slice(0,2).toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('authScreen').style.display = 'none';
  loadData();
  navigate('dashboard');
}
async function handleLogout() {
  await _sb.auth.signOut();
  currentUser = null;
  document.getElementById('authScreen').style.display = 'flex';
}
(async () => {
  const { data: { session } } = await _sb.auth.getSession();
  if (session && session.user.id === ALLOWED_USER_ID) {
    currentUser = session.user.email;
    const initials = (session.user.email || 'JD').split('@')[0].slice(0,2).toUpperCase();
    document.getElementById('userAvatar').textContent = initials;
    document.getElementById('authScreen').style.display = 'none';
    loadData();
    navigate('dashboard');
  }
})();
document.getElementById('authPassword').addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });
document.getElementById('authEmail').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('authPassword').focus(); });

// ============ DATA ============
async function loadData() {
  const [quotesRes, projectsRes] = await Promise.all([
    _sb.from('quote_requests').select('*').order('created_at', { ascending: false }),
    _sb.from('project_submissions').select('*').order('created_at', { ascending: false })
  ]);
  if (quotesRes.error) console.error('Error loading quotes:', quotesRes.error);
  else allQuotes = quotesRes.data || [];
  if (projectsRes.error) console.error('Error loading projects:', projectsRes.error);
  else allProjects = projectsRes.data || [];
  updateBadges();
  renderView(currentView);
}
function updateBadges() {
  const newQ = allQuotes.filter(q=>q.status==='new').length;
  const newP = allProjects.filter(p=>p.status==='new').length;
  document.getElementById('quotesBadge').textContent = newQ || '';
  document.getElementById('quotesBadge').style.display = newQ ? '' : 'none';
  document.getElementById('projectsBadge').textContent = newP || '';
  document.getElementById('projectsBadge').style.display = newP ? '' : 'none';
}
function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const viewNavMap = { dashboard: 0, quotes: 1, projects: 2, settings: 3 };
  const items = document.querySelectorAll('.nav-item');
  if (items[viewNavMap[view]]) items[viewNavMap[view]].classList.add('active');
  const titles = { dashboard: 'Dashboard', quotes: 'Quote Requests', projects: 'Project Submissions', settings: 'Settings' };
  document.getElementById('breadcrumbCurrent').textContent = titles[view] || view;
  renderView(view);
}
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('app').classList.toggle('sidebar-collapsed', sidebarCollapsed);
}

// ============ RENDER ============
function renderView(view) {
  const main = document.getElementById('mainContent');
  if (view === 'dashboard') main.innerHTML = renderDashboard();
  else if (view === 'quotes') main.innerHTML = renderQuotes();
  else if (view === 'projects') main.innerHTML = renderProjects();
  else if (view === 'settings') main.innerHTML = renderSettings();
  if (view === 'quotes') bindQuoteFilters();
  if (view === 'projects') bindProjectFilters();
}

// ============ DASHBOARD ============
function renderDashboard() {
  const totalQ = allQuotes.length, newQ = allQuotes.filter(q=>q.status==='new').length;
  const totalP = allProjects.length, activeP = allProjects.filter(p=>p.status==='in-progress').length;
  const acceptedQ = allQuotes.filter(q=>q.status==='accepted').length;
  const completedP = allProjects.filter(p=>p.status==='completed').length;
  const recentActivity = [...allQuotes.map(q=>({...q,_type:'quote'})), ...allProjects.map(p=>({...p,_type:'project'}))]
    .sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,6);
  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Overview of your client activity</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-secondary btn-sm" onclick="navigate('quotes')">View Quotes</button>
        <button class="btn btn-primary btn-sm" onclick="navigate('projects')">View Projects</button>
      </div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Quote Requests</div>
        <div class="kpi-value" style="color:var(--color-primary)">${totalQ}</div>
        <div class="kpi-trend up"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>${newQ} new</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Project Briefs</div>
        <div class="kpi-value" style="color:var(--color-purple)">${totalP}</div>
        <div class="kpi-trend" style="color:var(--color-gold)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>${activeP} active</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Accepted Quotes</div>
        <div class="kpi-value" style="color:var(--color-success)">${acceptedQ}</div>
        <div class="kpi-trend neutral">of ${totalQ} total</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Completed Projects</div>
        <div class="kpi-value" style="color:var(--color-gold)">${completedP}</div>
        <div class="kpi-trend neutral">of ${totalP} total</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Recent Activity</span>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="navigate('quotes')">All quotes →</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Client</th><th>Type</th><th>Project</th><th>Date</th><th>Status</th></tr></thead>
          <tbody>${recentActivity.map(item => `
            <tr onclick="${item._type==='quote'?`openQuoteModal('${item.id}')`:`openProjectModal('${item.id}')`}">
              <td><div class="td-name">${item.name}</div><div class="td-email">${item.email}</div></td>
              <td><span class="badge ${item._type==='quote'?'badge-reviewing':'badge-quoted'}">${item._type==='quote'?'Quote':'Project'}</span></td>
              <td>${item.project_name||item.project_type||'—'}</td>
              <td class="td-muted">${fmtDate(item.created_at)}</td>
              <td>${statusBadge(item.status)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ============ QUOTES VIEW ============
function renderQuotes() {
  const statuses = ['all','new','reviewing','quoted','accepted','declined','archived'];
  const counts = {};
  statuses.forEach(s => counts[s] = s==='all' ? allQuotes.length : allQuotes.filter(q=>q.status===s).length);
  const filtered = allQuotes
    .filter(q => activeQuoteFilter==='all' || q.status===activeQuoteFilter)
    .filter(q => !quoteSearch || q.name.toLowerCase().includes(quoteSearch.toLowerCase()) || q.email.toLowerCase().includes(quoteSearch.toLowerCase()) || q.project_name.toLowerCase().includes(quoteSearch.toLowerCase()) || q.service.toLowerCase().includes(quoteSearch.toLowerCase()));
  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">Quote Requests</h1>
        <p class="page-subtitle">${allQuotes.length} total submissions</p>
      </div>
    </div>
    <div class="card">
      <div class="tab-list">${statuses.map(s=>`
        <button class="tab-btn ${activeQuoteFilter===s?'active':''}" data-quote-tab="${s}">
          ${capitalize(s)}${counts[s]>0?`<span class="tab-count">${counts[s]}</span>`:''}
        </button>`).join('')}
      </div>
      <div style="padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--color-divider);">
        <div class="filters-bar">
          <div class="search-input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" placeholder="Search clients, projects…" id="quoteSearchInput" value="${quoteSearch}">
          </div>
        </div>
      </div>
      <div class="table-wrap">
        ${filtered.length === 0 ? `<div class="empty-state">
          <div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <h3>No quote requests</h3><p>No results match your current filters.</p>
        </div>` : `<table>
          <thead><tr><th>Client</th><th>Service</th><th>Project</th><th>Budget</th><th>Timeline</th><th>Submitted</th><th>Status</th><th></th></tr></thead>
          <tbody>${filtered.map(q=>`
            <tr onclick="openQuoteModal('${q.id}')">
              <td><div class="td-name">${q.name}</div><div class="td-email">${q.email}</div></td>
              <td class="td-muted">${q.service}</td>
              <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${q.project_name}</td>
              <td class="td-muted">${q.budget||'—'}</td>
              <td class="td-muted">${q.timeline||'—'}</td>
              <td class="td-muted">${fmtDate(q.created_at)}</td>
              <td>${statusBadge(q.status)}</td>
              <td class="td-actions">
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openQuoteModal('${q.id}')">View</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>`;
}

function bindQuoteFilters() {
  document.querySelectorAll('[data-quote-tab]').forEach(btn => {
    btn.addEventListener('click', e => { activeQuoteFilter = e.currentTarget.dataset.quoteTab; renderView('quotes'); });
  });
  const si = document.getElementById('quoteSearchInput');
  if (si) si.addEventListener('input', e => { quoteSearch = e.target.value; renderView('quotes'); });
}

// ============ PROJECTS VIEW ============
function renderProjects() {
  const statuses = ['all','new','reviewing','in-progress','completed','archived'];
  const counts = {};
  statuses.forEach(s => counts[s] = s==='all' ? allProjects.length : allProjects.filter(p=>p.status===s).length);
  const filtered = allProjects
    .filter(p => activeProjectFilter==='all' || p.status===activeProjectFilter)
    .filter(p => !projectSearch || p.name.toLowerCase().includes(projectSearch.toLowerCase()) || p.email.toLowerCase().includes(projectSearch.toLowerCase()) || p.project_type.toLowerCase().includes(projectSearch.toLowerCase()));
  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">Project Submissions</h1>
        <p class="page-subtitle">${allProjects.length} total briefs received</p>
      </div>
    </div>
    <div class="card">
      <div class="tab-list">${statuses.map(s=>`
        <button class="tab-btn ${activeProjectFilter===s?'active':''}" data-project-tab="${s}">
          ${capitalize(s==='in-progress'?'In Progress':s)}${counts[s]>0?`<span class="tab-count">${counts[s]}</span>`:''}
        </button>`).join('')}
      </div>
      <div style="padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--color-divider);">
        <div class="filters-bar">
          <div class="search-input">

// ============ STATUS UPDATES ============
async function updateQuoteStatus(id, newStatus) {
  const q = allQuotes.find(x=>x.id===id); if(!q) return;
  const { error } = await _sb.from('quote_requests').update({ status: newStatus }).eq('id', id);
  if (error) { showToast('Failed to update status.', 'error'); console.error(error); return; }
  q.status = newStatus;
  updateBadges();
  document.querySelectorAll('.status-option').forEach(btn => {
    const s = btn.getAttribute('onclick').match(/'([^']+)'$/)?.[1];
    btn.classList.toggle('selected', s === newStatus);
  });
  const footer = document.getElementById('modalFooter');
  if (footer) {
    const existingDel = footer.querySelector('.btn-danger');
    if (newStatus === 'archived' && !existingDel) {
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger btn-sm';
      delBtn.textContent = 'Delete Permanently';
      delBtn.onclick = () => deleteQuote(id);
      footer.insertBefore(delBtn, footer.firstChild);
    } else if (newStatus !== 'archived' && existingDel) {
      existingDel.remove();
    }
  }
  showToast(`Status updated to "${capitalize(newStatus)}"`, 'success');
  if (currentView === 'quotes') renderView('quotes');
  if (currentView === 'dashboard') renderView('dashboard');
}
async function updateProjectStatus(id, newStatus) {
  const p = allProjects.find(x=>x.id===id); if(!p) return;
  const { error } = await _sb.from('project_submissions').update({ status: newStatus }).eq('id', id);
  if (error) { showToast('Failed to update status.', 'error'); console.error(error); return; }
  p.status = newStatus;
  updateBadges();
  document.querySelectorAll('.status-option').forEach(btn => {
    const s = btn.getAttribute('onclick').match(/'([^']+)'$/)?.[1];
    btn.classList.toggle('selected', s === newStatus);
  });
  const footer = document.getElementById('modalFooter');
  if (footer) {
    const existingDel = footer.querySelector('.btn-danger');
    if (newStatus === 'archived' && !existingDel) {
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger btn-sm';
      delBtn.textContent = 'Delete Permanently';
      delBtn.onclick = () => deleteProject(id);
      footer.insertBefore(delBtn, footer.firstChild);
    } else if (newStatus !== 'archived' && existingDel) {
      existingDel.remove();
    }
  }
  showToast(`Status updated to "${capitalize(newStatus==='in-progress'?'In Progress':newStatus)}"`, 'success');
  if (currentView === 'projects') renderView('projects');
  if (currentView === 'dashboard') renderView('dashboard');
}
function copyEmail(email) {
  navigator.clipboard?.writeText(email).then(()=>showToast('Email copied!','success')).catch(()=>showToast('Could not copy','error'));
}

// ============ DELETE (ARCHIVED ONLY) ============
async function deleteQuote(id) {
  if (!confirm('Permanently delete this quote request? This cannot be undone.')) return;
  const { error } = await _sb.from('quote_requests').delete().eq('id', id);
  if (error) { showToast('Failed to delete.', 'error'); console.error(error); return; }
  allQuotes = allQuotes.filter(x => x.id !== id);
  updateBadges();
  closeModal();
  showToast('Quote request deleted.', 'success');
  if (currentView === 'quotes') renderView('quotes');
  if (currentView === 'dashboard') renderView('dashboard');
}
async function deleteProject(id) {
  if (!confirm('Permanently delete this project submission? This cannot be undone.')) return;
  const { error } = await _sb.from('project_submissions').delete().eq('id', id);
  if (error) { showToast('Failed to delete.', 'error'); console.error(error); return; }
  allProjects = allProjects.filter(x => x.id !== id);
  updateBadges();
  closeModal();
  showToast('Project submission deleted.', 'success');
  if (currentView === 'projects') renderView('projects');
  if (currentView === 'dashboard') renderView('dashboard');
}
// ============ MODAL ============
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal').classList.remove('open'); });

// ============ TOAST ============
function showToast(message, type='success') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${type==='success'?'<polyline points="20 6 9 17 4 12"/>':'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'}</svg> ${message}`;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ============ HELPERS ============
function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }
function fmtDateTime(iso) { return new Date(iso).toLocaleString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function badgeClass(s) {
  const map = {new:'badge-new',reviewing:'badge-reviewing',quoted:'badge-quoted',accepted:'badge-accepted','in-progress':'badge-in-progress',completed:'badge-completed',declined:'badge-declined',archived:'badge-archived'};
  return map[s]||'badge-archived';
}
function statusBadge(s) { return `<span class="badge ${badgeClass(s)}"><span class="badge-dot"></span>${capitalize(s==='in-progress'?'In Progress':s)}</span>`; }
function goalStars(p) {
  const max = Math.max(p.goal_sales||0, p.goal_brand||0, p.goal_social||0, p.goal_launch||0);
  const labels = {3:'High',2:'Med',1:'Low',0:'—'};
  return `<span style="font-size:var(--text-xs);color:var(--color-text-muted)">${labels[max]}</span>`;
}

// ============ THEME TOGGLE ============
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const html = document.documentElement;
  function setIcon(theme){
    if(!btn) return;
    btn.innerHTML = theme==='dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  setIcon(html.getAttribute('data-theme'));
  if(btn) btn.addEventListener('click', ()=>{
    const d = html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme',d); setIcon(d);
  });
})();
